services:
  backend:
    image: python:3.12-slim
    working_dir: /workspace/examples/chat-demo/backend
    command: >
      bash -lc ". .venv/bin/activate &&
      uvicorn app.main:create_app --factory --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ../..:/workspace
    ports:
      - "8000:8000"
    env_file:
      - .env
