services:
  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "${PHOENIX_PORT:-6006}:6006"
      - "${PHOENIX_OTLP_GRPC_PORT:-4317}:4317"

  backend:
    image: python:3.12-slim
    working_dir: /workspace/examples/chat-demo/backend
    command: >
      bash -lc "
      python -m venv /venv &&
      . /venv/bin/activate &&
      if [ ! -f /venv/.chat-demo-ready-phoenix ]; then
        python -m pip install -U pip &&
        python -m pip install -e /workspace[cli] -e .[dev] &&
        touch /venv/.chat-demo-ready-phoenix;
      fi &&
      uvicorn app.main:create_app --factory --host 0.0.0.0 --port 8010 --reload
      --reload-dir /workspace/agent_driver
      --reload-dir /workspace/examples/chat-demo/backend
      "
    volumes:
      - ../..:/workspace
      - backend_venv:/venv
      - backend_cache:/root/.cache/pip
    ports:
      - "${APP_PORT:-8010}:8010"
    env_file:
      - path: ../../.env
        required: false
      - path: .env
        required: false
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8010
      APP_CORS_ORIGINS: >-
        http://localhost:${FRONTEND_PORT:-5173},
        http://127.0.0.1:${FRONTEND_PORT:-5173}
      CHAT_DEMO_FAKE_SCENARIO: ${CHAT_DEMO_FAKE_SCENARIO:-}
      CHAT_DEMO_FORCE_PLANNING: ${CHAT_DEMO_FORCE_PLANNING:-false}
      CHAT_DEMO_TRACING_ENABLED: ${CHAT_DEMO_TRACING_ENABLED:-true}
      PHOENIX_COLLECTOR_ENDPOINT: ${PHOENIX_COLLECTOR_ENDPOINT:-http://phoenix:6006/v1/traces}
      PHOENIX_PROJECT_NAME: ${PHOENIX_PROJECT_NAME:-agent-driver-chat-demo}
      AGENT_DRIVER_RUNTIME_STORE_KIND: sqlite
      CHAT_DEMO_SESSIONS_PATH: /workspace/examples/chat-demo/.agent-driver/sessions.json
    depends_on:
      - phoenix

  frontend:
    image: node:20-bookworm-slim
    working_dir: /workspace/examples/chat-demo/frontend
    command: >
      bash -lc "
      corepack enable &&
      corepack prepare pnpm@10.25.0 --activate &&
      pnpm config set store-dir /pnpm/store &&
      pnpm install --frozen-lockfile &&
      pnpm dev --host 0.0.0.0 --port 5173
      "
    volumes:
      - ../..:/workspace
      - frontend_node_modules:/workspace/examples/chat-demo/frontend/node_modules
      - frontend_pnpm_store:/pnpm/store
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      CI: "true"
      VITE_API_PROXY_TARGET: http://backend:8010
    depends_on:
      - backend

volumes:
  backend_venv:
  backend_cache:
  frontend_node_modules:
  frontend_pnpm_store:
